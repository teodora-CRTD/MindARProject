<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; }

      #pinned-video-container {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 999;
        width: 80vw;
        max-width: 480px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      }
      #pinned-video-container video {
        width: 100%;
        display: block;
      }
      #close-pinned {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(0,0,0,0.6);
        color: white;
        border: none;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        font-size: 18px;
        cursor: pointer;
        z-index: 1000;
        line-height: 32px;
        text-align: center;
      }
      #tap-hint {
        display: none;
        position: fixed;
        bottom: 40px;
        width: 100%;
        text-align: center;
        color: white;
        font-family: sans-serif;
        font-size: 14px;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        z-index: 998;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <div id="pinned-video-container">
      <button id="close-pinned">✕</button>
      <video
        id="pinned-video"
        src="./video.mp4"
        loop
        playsinline
        webkit-playsinline
      ></video>
    </div>

    <div id="tap-hint">👆 Tap the video to pin it</div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="ar-video"
          src="./video.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline
        ></video>
      </a-assets>

      <!-- Added cursor + raycaster to camera -->
      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse;"
        raycaster="far: 10000; objects: .clickable"
      ></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" video-handler>
        <!-- Added class="clickable" -->
        <a-video
          id="ar-video-plane"
          class="clickable"
          src="#ar-video"
          position="0 0 0"
          width="1"
          height="0.552"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      document.querySelector('a-scene').addEventListener('loaded', () => {
        const vrBtn = document.querySelector('.a-enter-vr');
        if (vrBtn) vrBtn.style.display = 'none';
      });

      AFRAME.registerComponent('video-handler', {
        init: function () {
          const arVideo = document.getElementById('ar-video');
          const pinnedContainer = document.getElementById('pinned-video-container');
          const pinnedVideo = document.getElementById('pinned-video');
          const tapHint = document.getElementById('tap-hint');
          const closeBtn = document.getElementById('close-pinned');
          const arPlane = document.getElementById('ar-video-plane');

          let isPinned = false;
          let isTargetVisible = false;

          this.el.addEventListener('targetFound', () => {
            isTargetVisible = true;
            if (!isPinned) {
              arVideo.play();
              tapHint.style.display = 'block';
            }
          });

          this.el.addEventListener('targetLost', () => {
            isTargetVisible = false;
            if (!isPinned) {
              arVideo.pause();
              tapHint.style.display = 'none';
            }
          });

          // Now works because of cursor + raycaster + .clickable
          arPlane.addEventListener('click', () => {
            if (isPinned) return;
            isPinned = true;
            tapHint.style.display = 'none';

            pinnedVideo.currentTime = arVideo.currentTime;
            pinnedVideo.muted = false;
            pinnedVideo.play();
            pinnedContainer.style.display = 'block';
            arVideo.pause();
          });

          closeBtn.addEventListener('click', () => {
            isPinned = false;
            pinnedVideo.pause();
            pinnedContainer.style.display = 'none';

            if (isTargetVisible) {
              arVideo.currentTime = pinnedVideo.currentTime;
              arVideo.play();
              tapHint.style.display = 'block';
            }
          });
        }
      });
    </script>
  </body>
</html>
