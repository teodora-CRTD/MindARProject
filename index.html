<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="ar-video"
          src="./video.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" video-handler>
        <a-video
          src="#ar-video"
          position="0 0 0"
          width="1"
          height="0.552"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      // Remove VR button once scene loads
      document.querySelector('a-scene').addEventListener('loaded', () => {
        const vrBtn = document.querySelector('.a-enter-vr');
        if (vrBtn) vrBtn.style.display = 'none';
      });

      // Play/pause video on target found/lost
      AFRAME.registerComponent('video-handler', {
        init: function () {
          const video = document.getElementById('ar-video');
          this.el.addEventListener('targetFound', () => video.play());
          this.el.addEventListener('targetLost', () => video.pause());
        }
      });
    </script>
  </body>
</html>
